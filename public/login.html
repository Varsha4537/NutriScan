<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — NutriScan</title>
  <meta name="description" content="Log in to your NutriScan account to start scanning food labels." />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🥗</div>
      <h1>Welcome back</h1>
      <p>Log in to continue scanning smarter</p>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      <div id="login-alert" class="alert alert-error" role="alert"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input
          class="form-control" type="email" id="email"
          name="email" placeholder="you@example.com"
          autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-control" type="password" id="password"
          name="password" placeholder="••••••••"
          autocomplete="current-password" required />
      </div>

      <button class="btn btn-primary btn-block" type="submit" id="login-btn">
        Log In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account?
      <a href="/register">Create one free</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
